<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Core</title>
    <!-- Tailwind CSS (Required for base styling of the new UI) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --basalt-900: #0a0a0b;
            --basalt-800: #161618;
            --basalt-700: #242427;
            --basalt-600: #323236;
            --pressure-glow: rgba(0, 255, 170, 0.15);
            --accent: #00ffaa;
            --critical: #ff4444;
            --text-main: #e2e2e7;
        }

        /* Update 1: Change body width/height */
        body {
        background-color: #010101;  /* <--- CHANGE THIS FROM 'transparent' */
        color: var(--text-main);
        font-family: 'Outfit', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;       
        height: 100vh;      
        margin: 0;
        overflow: hidden;
        user-select: none;
        }

        /* Update 2: Make the slab responsive */
        .slab {
            background: var(--basalt-800);
            width: 100%;        /* CHANGED from 520px to 100% */
            height: 100%;       /* CHANGED to 100% */
            box-sizing: border-box; /* ADDED */
            padding: 2px;
            box-shadow: 
                0 0 0 1px var(--basalt-700),
                20px 20px 60px rgba(0,0,0,0.8);
            position: relative;
            clip-path: polygon(
                0% 15px, 15px 0%, 
                100% 0%, 100% calc(100% - 15px), 
                calc(100% - 15px) 100%, 0% 100%
            );
        }

        .slab-inner {
            background: var(--basalt-800);
            padding: 32px;
            height: 100%;
            display: flex;
            flex-direction: column;
            -webkit-app-region: drag; /* Makes window draggable */
        }

        /* Friction-Fit Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            border-bottom: 4px solid var(--basalt-700);
            padding-bottom: 12px;
            
        }

        .header h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            font-size: 1.5rem;
            line-height: 0.8;
            margin-top: 4px;
        }

        .header span.brand {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* Enhanced Window Controls */
        .win-rheader {
            justify-items: right;
            align-items: center;
            gap: 12px;
            -webkit-app-region: no-drag;
        }

        .window-controls {
            display: flex;
            gap: 4px;
            margin-top: 0px; 
            justify-content: flex-end;
        }

        .win-btn {
            width: 32px;
            height: 32px;
            background: var(--basalt-700);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border: 1px solid transparent;
        }

        .win-btn:hover {
            background: var(--basalt-600);
            border-color: var(--accent);
        }

        .win-btn.close:hover {
            background: var(--critical);
            border-color: var(--critical);
        }

        /* Icons */
        .icon-min { width: 12px; height: 2px; background: #6a6a70; transition: background 0.2s; }
        .icon-close { width: 14px; height: 14px; position: relative; }
        .icon-close::before, .icon-close::after {
            content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
            background: #6a6a70; transition: background 0.2s;
        }
        .icon-close::before { transform: rotate(45deg); }
        .icon-close::after { transform: rotate(-45deg); }

        /* Hover States for Icons */
        .win-btn:hover .icon-min { background: var(--accent); }
        .win-btn:hover .icon-close::before, .win-btn:hover .icon-close::after { background: var(--accent); }
        .win-btn.close:hover .icon-close::before, .win-btn.close:hover .icon-close::after { background: var(--basalt-900); }

        .update-link {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: opacity 0.2s;
            display: block;
            margin-top: 6px;
        }
        .update-link:hover { opacity: 0.7; }

        /* Update 3: Allow the list of scripts to shrink/grow infinitely */
        .script-list {
            display: flex;
            flex-direction: column;
            gap: 4px; 
            flex: 1;           /* ADDED: Pushes the footer down and stretches */
            /* max-height: 380px; --- REMOVE THIS LINE ENTIRELY */
            overflow-y: auto;
            padding-right: 6px;
            -webkit-app-region: no-drag;
        }

        /* Custom Scrollbar for the list */
        .script-list::-webkit-scrollbar { width: 4px; }
        .script-list::-webkit-scrollbar-track { background: var(--basalt-800); }
        .script-list::-webkit-scrollbar-thumb { background: var(--basalt-600); border-radius: 4px; }
        .script-list::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .script-item {
            background: var(--basalt-700);
            padding: 16px;
            display: grid;
            /* FIXED: Force column sizes. Handle(12px), Checkbox(30px), Text(Remaining), Help(20px) */
            grid-template-columns: 12px 30px minmax(0, 1fr) 20px;
            gap: 12px; /* Added gap to keep things spaced cleanly */
            align-items: center;
            cursor: grab;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            border-left: 0px solid var(--accent);
        }

        .script-item:hover {
            background: var(--basalt-600);
            transform: translateX(4px);
            border-left: 4px solid var(--accent);
            box-shadow: -10px 0 20px rgba(0, 255, 170, 0.05);
        }

        .handle {
            width: 12px;
            height: 20px;
            background-image: radial-gradient(var(--basalt-600) 1.5px, transparent 0);
            background-size: 4px 4px;
            opacity: 0.5;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .checkbox-container input { display: none; }

        .latch {
            width: 18px;
            height: 18px;
            border: 2px solid var(--basalt-600);
            position: relative;
            transition: all 0.3s ease;
        }

        .checkbox-container input:checked + .latch {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--pressure-glow);
        }

        .checkbox-container input:checked + .latch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 4px;
            height: 8px;
            border: solid var(--basalt-900);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .script-info { 
            /* FIXED: min-width: 0 is a grid hack that allows text children to wrap! */
            min-width: 0; 
            padding-left: 0; 
            display: flex;
            flex-direction: column;
        }

        .script-name {
            font-weight: 700;
            font-size: 0.95rem;
            display: block;
        }

        .script-meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #6a6a70;
            display: block;
            margin-top: 4px;
            /* FIXED: Force the long path text to wrap onto a new line */
            white-space: normal;
            word-wrap: break-word;
            line-height: 1.3;
        }

        /* Tooltip Component */
        .info-trigger {
            width: 20px;
            height: 20px;
            border: 1px solid var(--basalt-600);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #6a6a70;
            cursor: help;
            transition: all 0.2s;
            border-radius: 2px;
            position: relative;
            justify-self: end; /* Push firmly to the right edge */
            flex-shrink: 0;    /* Prevent it from being squished */
        }

        .info-trigger:hover {
            background: var(--accent);
            color: var(--basalt-900);
            border-color: var(--accent);
        }

        .tooltip {
            position: absolute;
            right: 100%;
            top: 50%;
            transform: translateY(-50%) translateX(-10px);
            background: var(--accent);
            color: var(--basalt-900);
            padding: 8px 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            font-weight: 700;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s;
            clip-path: polygon(0% 0%, 90% 0%, 100% 50%, 90% 100%, 0% 100%);
            z-index: 10;
        }

        .info-trigger:hover .tooltip {
            opacity: 1;
            transform: translateY(-50%) translateX(-20px);
        }

        .grain {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .script-item {
            animation: slideIn 0.4s ease forwards;
            animation-delay: calc(var(--i) * 0.05s);
            opacity: 0;
        }

        .footer-controls {
            margin-top: 24px;
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="grain"></div>

    <div class="slab">
        <div class="slab-inner">
            <!-- Header -->
            <div class="header">
                <div>
                    <span class="brand">System_Core <small style="color: #6a6a70; margin-left: 8px; font-size: 0.6rem;">v.1.0.0</small></span>
                    <h1>Script Manager</h1>
                </div>
                <div class="win-rheader">
                    <div class="window-controls">
                        <div class="win-btn" title="Minimize" onclick="if(window.ahk) ahk.gui.Minimize()">
                            <div class="icon-min"></div>
                        </div>
                        <div class="win-btn close" title="Close" onclick="if(window.ahk) ahk.gui.Hide()">
                            <div class="icon-close"></div>
                        </div> 
                    </div>
                    <span class="update-link" onclick="alert('Update Check Initialized...');">Update Available!</span>
                </div>
            </div>

            <!-- Dynamic Lists -->
            <div class="script-list" id="sortableList">
                <!-- Checkboxes & details generated via Javascript below -->
            </div>

            <!-- Footer -->
            <div class="footer-controls">
                <button style="
                    flex: 1; background: var(--basalt-700); border: 1px solid var(--basalt-600); padding: 12px; color: var(--text-main); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; transition: all 0.2s; cursor: pointer;" 
                    onmouseover="this.style.borderColor='var(--accent)'; this.style.color='var(--accent)';" 
                    onmouseout="this.style.borderColor='var(--basalt-600)'; this.style.color='var(--text-main)';"
                    onclick="this.innerHTML='SYNCING...'; if(window.ahk) ahk.ReloadScript(); setTimeout(() => this.innerHTML='RELOAD SCRIPTS', 1000)">
                    RELOAD SCRIPTS
                </button>
                <button style="
                    width: 48px; background: var(--accent); color: var(--basalt-900); padding: 12px; display: flex; align-items: center; justify-content: center; border: none; font-size: 1.2rem; transition: opacity 0.2s; cursor: pointer;" 
                    onmouseover="this.style.opacity='0.8'" 
                    onmouseout="this.style.opacity='1'"
                    onclick="if(window.ahk) { ahk.ShowSettings().catch(e => alert(e)); }">
                    <i class="bi bi-gear-fill"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Script Handling -->
    <script>
        // Init Checkboxes dynamically via AHK connection
        async function initCheckboxes() {
            if (!window.ahk) return;

            try {
                const modulesStr = await ahk.GetModules();
                const modules = JSON.parse(modulesStr);
                
                const resultStr = await ahk.GetToggles();
                const toggles = JSON.parse(resultStr);

                const readmesStr = await ahk.GetReadmes();
                const readmes = JSON.parse(readmesStr);

                const container = document.getElementById('sortableList');
                container.innerHTML = '';

                modules.forEach((mod, index) => {
                    const isChecked = toggles[mod] == 1 || toggles[mod] == true ? 'checked' : '';
                    const hasReadme = readmes[mod] == 1 || readmes[mod] === true;
                    
                    // Dummy data for visual effect requested
                    const dummyPath = `C:\\System\\Scripts\\${mod}.ahk`;
                    const dummySize = `${(Math.random() * 20 + 2).toFixed(1)}kb`;

                    // Generate Help Icon block conditionally
                    const helpIconHtml = hasReadme 
                        ? `
                        <div class="info-trigger" onclick="showReadme('${mod}')">
                            ?
                            <div class="tooltip">VIEW_README</div>
                        </div>` 
                        : `<div></div>`; // Empty placeholder grid item

                    // Append exact syntax of original Basalt script-item
                    container.innerHTML += `
                        <div class="script-item" style="--i: ${index + 1}">
                            <div class="handle"></div>
                            <label class="checkbox-container">
                                <input type="checkbox" ${isChecked} onchange="updateToggle('${mod}', this.checked)">
                                <div class="latch"></div>
                            </label>
                            <div class="script-info">
                                <span class="script-name">${mod}.ahk</span>
                                <span class="script-meta">${dummyPath} // SIZE: ${dummySize}</span>
                            </div>
                            ${helpIconHtml}
                        </div>
                    `;
                });

                // Attach Drag/Drop functionality after DOM loads
                attachDragEvents();

            } catch (e) {
                console.error("Failed to load toggles", e);
            }
        }

        // AHK API functions
        function showReadme(mod) {
            if (window.ahk) ahk.ShowReadme(mod);
        }

        function hideReadme() {
            if (window.ahk) ahk.HideReadme();
        }

        function updateToggle(name, value) {
            if (window.ahk) ahk.UpdateToggle(name, value ? 1 : 0);
        }

        // Drag & Drop Implementation
        let dragSrcEl = null;

        function handleDragStart(e) {
            this.style.opacity = '0.4';
            dragSrcEl = this;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/html', this.innerHTML);
        }

        function handleDragOver(e) {
            if (e.preventDefault) { e.preventDefault(); }
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDrop(e) {
            if (e.stopPropagation) { e.stopPropagation(); }
            if (dragSrcEl != this) {
                dragSrcEl.innerHTML = this.innerHTML;
                this.innerHTML = e.dataTransfer.getData('text/html');
            }
            return false;
        }

        function handleDragEnd(e) {
            this.style.opacity = '1';
        }

        function attachDragEvents() {
            let items = document.querySelectorAll('.script-item');
            items.forEach(function(item) {
                item.setAttribute('draggable', 'true');
                item.addEventListener('dragstart', handleDragStart, false);
                item.addEventListener('dragover', handleDragOver, false);
                item.addEventListener('drop', handleDrop, false);
                item.addEventListener('dragend', handleDragEnd, false);
            });
        }

        // Run Initialization
        window.addEventListener('DOMContentLoaded', () => {
            initCheckboxes();
        });
    </script>
</body>
</html>
