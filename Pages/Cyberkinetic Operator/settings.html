<!DOCTYPE html>
<html lang="en" class="!bg-transparent dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit mode.ini</title>
    <!-- Theme FOUC Preventer -->
    <script>if(localStorage.theme==='light')document.documentElement.classList.remove('dark');else document.documentElement.classList.add('dark');</script>
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // LIGHT MODE (DEFAULT)
                        basalt: { 900: '#f8f8fa', 800: '#ededf0', 700: '#d8d8dd', 600: '#bfc0c7' },
                        accent: '#ff8800',
                        critical: '#e53935',
                        textMain: '#23232a',
                        textMuted: '#666972',
                        // DARK MODE COLORS
                        'd-basalt': { 900: '#0a0a0b', 800: '#161618', 700: '#242427', 600: '#323236' },
                        'd-accent': '#00ffaa',
                        'd-critical': '#ff4444',
                        'd-textMain': '#e2e2e7',
                        'd-textMuted': '#6a6a70'
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                        jetbrains: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- CodeMirror Base & Theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/darcula.min.css">
    <!-- Shared Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="!bg-transparent text-textMain dark:text-d-textMain font-outfit flex items-center justify-center w-screen h-screen m-0 overflow-hidden select-none" oncontextmenu="return true;"> 
    <div class="w-full h-full box-border p-[2px] relative [clip-path:polygon(0%_15px,15px_0%,100%_0%,100%_calc(100%-15px),calc(100%-15px)_100%,0%_100%)] bg-basalt-800 dark:bg-d-basalt-800">
        <div class="grain"></div>
        <div class="bg-basalt-800 dark:bg-d-basalt-800 h-full flex flex-col !p-0">
            <!-- Header -->
            <div class="flex justify-between items-start !mb-0 border-b-2 border-basalt-700 dark:border-d-basalt-700 pt-2 pr-2 pb-3 pl-8 [-webkit-app-region:drag]">
                <div class="flex">
                    <div>
                        <span class="font-jetbrains text-[0.7rem] text-accent dark:text-d-accent uppercase tracking-[0.2em]">MODE.INI <small class="text-textMuted dark:text-d-textMuted ml-2 text-[0.6rem]">EDITOR</small></span>
                    </div>
                    <!-- Save Button -->
                    <button class="font-jetbrains text-[0.65rem] uppercase tracking-[0.1em] cursor-pointer transition-all duration-200 bg-accent/10 dark:bg-d-accent/5 border border-accent dark:border-d-accent text-accent dark:text-d-accent py-1.5 px-3 rounded-sm font-bold flex items-center h-8 [-webkit-app-region:no-drag] mx-4 hover:bg-accent dark:hover:bg-d-accent hover:text-basalt-900 dark:hover:text-d-basalt-900" id="saveBtn" onclick="saveFile(this)">
                        <span>SAVE</span>
                    </button>
                </div>
                <!-- Window Controls -->
                <div class="flex gap-1 mt-0 justify-end">
                    <div class="w-8 h-8 bg-basalt-700 dark:bg-d-basalt-700 flex items-center justify-center cursor-pointer transition-all duration-200 ease-[cubic-bezier(0.4,0,0.2,1)] relative border border-transparent hover:bg-basalt-600 dark:hover:bg-d-basalt-600 hover:border-accent dark:hover:border-d-accent group" title="Minimize" onclick="if(window.ahk) ahk.gui.Minimize()">
                        <div class="w-3 h-[2px] bg-textMuted dark:bg-d-textMuted transition-colors duration-200 group-hover:bg-accent dark:group-hover:bg-d-accent"></div>
                    </div>
                    <div class="w-8 h-8 bg-basalt-700 dark:bg-d-basalt-700 flex items-center justify-center cursor-pointer transition-all duration-200 ease-[cubic-bezier(0.4,0,0.2,1)] relative border border-transparent hover:bg-critical dark:hover:bg-d-critical hover:border-critical dark:hover:border-d-critical group" title="Close" onclick="if(window.ahk) ahk.gui.Hide()">
                        <div class="w-[14px] h-[14px] relative before:content-[''] before:absolute before:top-1/2 before:left-0 before:w-full before:h-[2px] before:bg-textMuted before:dark:bg-d-textMuted before:transition-colors before:duration-200 before:rotate-45 after:content-[''] after:absolute after:top-1/2 after:left-0 after:w-full after:h-[2px] after:bg-textMuted after:dark:bg-d-textMuted after:transition-colors after:duration-200 after:-rotate-45 group-hover:before:bg-basalt-900 group-hover:after:bg-basalt-900 dark:group-hover:before:bg-d-basalt-900 dark:group-hover:after:bg-d-basalt-900"></div>
                    </div> 
                </div>
            </div>

            <!-- Full Width/Height Code Editor Container -->
            <div class="flex-1 flex flex-col min-h-0 w-full [-webkit-app-region:no-drag] bg-basalt-800 dark:bg-d-basalt-800">
                <textarea id="editor" spellcheck="false"></textarea>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Sync theme with other windows
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                if(e.newValue === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/simple.min.js"></script>
    <script>
        // REDESIGNED: Single-State Left-to-Right Parser
        CodeMirror.defineSimpleMode("ini-colorful", {
            start: [
                { regex: /^[ \t]*;.*/, token: "comment" },
                { regex: /^[ \t]*\[[^\]]+\]/, token: "header" },
                { regex: /^([ \t]*)([^=]+?)([ \t]*=[ \t]*)/, token: [null, "keyword", "operator"] },
                { regex: /;.*/, token: "comment" },
                { regex: /"(?:[^\\]|\\.)*?(?:"|$)/, token: "string" },
                { regex: /'(?:[^\\]|\\.)*?(?:'|$)/, token: "string" },
                { regex: /\b(?:true|yes|on)\b/i, token: "bool-true" },
                { regex: /\b(?:false|no|off)\b/i, token: "bool-false" },
                { regex: /\b(?:null|toggle)\b/i, token: "atom" },
                { regex: /[-+]?\d+(?:\.\d+)?/, token: "number" },
                { regex: /[\^!+#]+/, token: "builtin" },
                { regex: /[^;\s]+/, token: "string" },
                { regex: /[ \t]+/, token: null }
            ]
        });

        const editorElement = document.getElementById('editor');

        const cm = CodeMirror.fromTextArea(editorElement, {
            mode: 'ini-colorful',
            theme: 'darcula', // Base theme, mostly overridden by our style.css
            lineNumbers: true,
            indentUnit: 4,
            scrollbarStyle: 'native'
        });
        
        async function loadFile() {
            if (window.ahk) {
                try {
                    const content = await ahk.GetIniContent();
                    cm.setValue(content);
                    setTimeout(() => cm.refresh(), 50);
                } catch (e) { console.error("Failed to load INI:", e); }
            }
        }

        function saveFile(btn) {
            if (window.ahk) {
                ahk.SaveIniContent(cm.getValue());
                if (btn) {
                    const oldHtml = btn.innerHTML;
                    const isDark = document.documentElement.classList.contains('dark');
                    btn.innerHTML = '<span>SAVED</span>';
                    btn.style.background = isDark ? 'var(--d-accent)' : 'var(--accent)';
                    btn.style.color = isDark ? 'var(--d-basalt-900)' : 'var(--basalt-900)';
                    
                    setTimeout(() => {
                        btn.innerHTML = oldHtml;
                        btn.style.background = '';
                        btn.style.color = '';
                    }, 1000);
                }
            }
        }

        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key.toLowerCase() === 's') {
                e.preventDefault();
                saveFile(document.getElementById('saveBtn'));
            }
        });

        window.addEventListener('DOMContentLoaded', loadFile);
    </script>
</body>
</html>
