<!DOCTYPE html>
<html lang="en" class="!bg-transparent dark">
<head>
    <meta charset="UTF-8">

    <!-- Theme FOUC Preventer -->

    <!-- Tailwind CSS -->

                        'd-textMuted': '#6a6a70'

<body class="!bg-transparent text-textMain dark:text-d-textMain font-outfit flex items-center justify-center w-screen h-screen m-0 overflow-hidden select-none" oncontextmenu="return true;">
    <div class="w-full h-full box-border p-[2px] relative bg-basalt-800 dark:bg-d-basalt-800" id="windowContainer">
        <div class="grain"></div>
        <div class="bg-basalt-800 dark:bg-d-basalt-800 h-full flex flex-col pt-2 pr-2 pb-[22px] pl-[22px]">
            <!-- Header -->
            <div class="flex justify-between items-start mb-1 border-b-4 border-basalt-700 dark:border-d-basalt-700 pb-3 [-webkit-app-region:drag]">
                <div>
                    <span class="font-jetbrains text-[0.7rem] text-accent dark:text-d-accent uppercase tracking-[0.2em]">System_Core <small class="text-textMuted dark:text-d-textMuted ml-2 text-[0.6rem]">v.1.0.0</small></span>
                    <h1 class="font-black uppercase tracking-tighter text-2xl leading-[0.8] mt-1.5 text-textMain dark:text-d-textMain">Script Manager</h1>
                </div>
                <div class="justify-items-end items-center gap-3 [-webkit-app-region:no-drag]">
                    <div class="flex gap-1 mt-0 justify-end">
                        <div class="w-8 h-8 flex items-center justify-center cursor-pointer relative border border-transparent transition-all duration-300 ease-in-out hover:shadow-[0_0_15px_rgba(255,166,0,0.5)] dark:hover:shadow-[0_0_15px_rgba(0,255,170,0.5)] group mr-4" title="Github" onclick="window.open('https://github.com/achrllrogia45', '_blank')">
                            <i class="bi bi-github text-textMain dark:text-d-textMain group-hover:text-accent dark:group-hover:text-d-accent transition-colors duration-300"></i>
                        </div>
                        <div class="w-8 h-8 bg-basalt-700 dark:bg-d-basalt-700 flex items-center justify-center cursor-pointer transition-all duration-200 ease-[cubic-bezier(0.4,0,0.2,1)] relative border border-transparent hover:bg-basalt-600 dark:hover:bg-d-basalt-600 hover:border-accent dark:hover:border-d-accent group" title="Minimize" onclick="if(window.ahk) ahk.gui.Minimize()">
                            <div class="w-3 h-[2px] bg-textMuted dark:bg-d-textMuted transition-colors duration-200 group-hover:bg-accent dark:group-hover:bg-d-accent"></div>
                        </div>
                        <div class="w-8 h-8 bg-basalt-700 dark:bg-d-basalt-700 flex items-center justify-center cursor-pointer transition-all duration-200 ease-[cubic-bezier(0.4,0,0.2,1)] relative border border-transparent hover:bg-critical dark:hover:bg-d-critical hover:border-critical dark:hover:border-d-critical group" title="Close" onclick="if(window.ahk) ahk.gui.Hide()">
                            <div class="w-[14px] h-[14px] relative before:content-[''] before:absolute before:top-1/2 before:left-0 before:w-full before:h-[2px] before:bg-textMuted before:dark:bg-d-textMuted before:transition-colors before:duration-200 before:rotate-45 after:content-[''] after:absolute after:top-1/2 after:left-0 after:w-full after:h-[2px] after:bg-textMuted after:dark:bg-d-textMuted after:transition-colors after:duration-200 after:-rotate-45 group-hover:before:bg-basalt-900 group-hover:after:bg-basalt-900 dark:group-hover:before:bg-d-basalt-900 dark:group-hover:after:bg-d-basalt-900"></div>
                        </div> 
                    </div>
                </div>
            </div>

            <!-- Profile Dropdown (Dynamic) -->
            <div class="relative group mb-1 [-webkit-app-region:no-drag]" id="profileDropdown">
                <button class="cursor-pointer text-[0.75rem] font-bold uppercase tracking-widest transition-all duration-200 text-textMain dark:text-d-textMain font-jetbrains hover:text-accent dark:hover:text-d-accent flex items-center gap-2" onclick="document.getElementById('profileDropdown').classList.toggle('active')">
                    <span id="currentProfileText">PROFILE_</span>
                    <i class="bi bi-chevron-down text-[0.6rem] transition-transform duration-300 group-[.active]:rotate-180"></i>
                </button>
                <div class="absolute top-full left-0 mt-1 w-56 bg-basalt-700 dark:bg-d-basalt-700 border border-basalt-600 dark:border-d-basalt-600 opacity-0 invisible group-active:opacity-100 group-active:visible group-[.active]:opacity-100 group-[.active]:visible transition-all duration-300 ease-out origin-top -translate-y-2 group-active:translate-y-0 group-[.active]:translate-y-0 z-20 shadow-lg shadow-black/20 dark:shadow-d-basalt-900/50">
                    <div class="p-3 flex flex-col gap-2">
                        <div class="px-2 py-1.5 text-[0.65rem] font-jetbrains text-textMuted dark:text-d-textMuted uppercase tracking-widest border-b border-basalt-600 dark:border-d-basalt-600 pb-2 mb-1">Available Profiles</div>
                        <div class="flex flex-col gap-1 max-h-48 overflow-y-auto" id="profileList">
                            <!-- JS Fills this dynamically -->
                        </div>
                    </div>
                </div>
            </div>                

            <!-- Dynamic Lists -->
            <div class="script-list flex flex-col gap-1 flex-1 overflow-y-auto pr-1.5 [-webkit-app-region:no-drag]" id="sortableList"></div>

            <!-- Footer -->
            <div class="mt-2.5 flex gap-2 [-webkit-app-region:no-drag] mr-2" id="controls">
                <button id="theme-toggle-button" class="p-0 flex-none cursor-pointer border-none text-[1.5rem] w-[28px] transition-opacity duration-200 text-accent dark:text-d-accent hover:opacity-80" >
                    <i id="theme-toggle-icon" class="bi bi-moon-stars-fill"></i>
                </button>
                <button class="p-1 cursor-pointer grow text-[0.75rem] font-bold uppercase tracking-widest transition-all duration-200 bg-basalt-700 dark:bg-d-basalt-700 border border-basalt-600 dark:border-d-basalt-600 text-textMain dark:text-d-textMain font-jetbrains hover:border-accent dark:hover:border-d-accent hover:text-accent dark:hover:text-d-accent" 
                    onclick="this.innerHTML='SYNCING...'; if(window.ahk) ahk.ReloadScript(); setTimeout(() => this.innerHTML='RELOAD SCRIPTS', 1000)">
                    RELOAD SCRIPTS
                </button>
                <button class="p-0 flex-none cursor-pointer border-none text-lg w-[28px] transition-opacity duration-200 text-accent dark:text-d-accent hover:opacity-80" 
                    onclick="if(window.ahk) { ahk.ShowSettings().catch(e => alert(e)); }">
                    <i class="bi bi-gear-fill"></i>
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // --- THEME SWITCHER LOGIC ---
        const themeToggleButton = document.getElementById('theme-toggle-button');
        const themeToggleIcon = document.getElementById('theme-toggle-icon');

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                if(themeToggleIcon) themeToggleIcon.className = 'bi bi-moon-stars-fill';
            } else {
                document.documentElement.classList.remove('dark');
                if(themeToggleIcon) themeToggleIcon.className = 'bi bi-brightness-low-fill';
            }
        }
        applyTheme(localStorage.getItem('theme') || 'dark');

        themeToggleButton.addEventListener('click', () => {
            const isCurrentlyDark = document.documentElement.classList.contains('dark');
            const newTheme = isCurrentlyDark ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
            if (window.ahk) ahk.UpdateToggle("Theme", (newTheme === 'dark') ? 1 : 0);
        });
        window.addEventListener('storage', (e) => { if (e.key === 'theme') applyTheme(e.newValue); });
    </script>
 <script type="module">
        async function initCheckboxes() {
            if (!window.ahk) return;
            try {
                const modules = JSON.parse(await ahk.GetModules());
                const toggles = JSON.parse(await ahk.GetToggles());
                const readmes = JSON.parse(await ahk.GetReadmes());
                const container = document.getElementById('sortableList');
                container.innerHTML = '';

                modules.forEach((mod, index) => {
                    const isChecked = (toggles[mod.name] == 1 || toggles[mod.name] == true) ? 'checked' : '';
                    const hasReadme = (readmes[mod.name] == 1 || readmes[mod.name] === true);
                    
                    // RESTORED: The full HTML for the "?" tooltip button
                    const helpIconHtml = hasReadme 
                        ? `<div class="w-5 h-5 border border-basalt-600 dark:border-d-basalt-600 flex items-center justify-center font-jetbrains text-[0.7rem] text-textMuted dark:text-d-textMuted cursor-help transition-all duration-200 rounded-sm relative justify-self-end shrink-0 hover:bg-accent dark:hover:bg-d-accent hover:text-basalt-900 dark:hover:text-d-basalt-900 hover:border-accent dark:hover:border-d-accent group/info" onclick="window.showReadme('${mod.name}')">?
                                <div class="absolute right-full top-1/2 -translate-y-1/2 -translate-x-[10px] bg-accent dark:bg-d-accent text-basalt-900 dark:text-d-basalt-900 py-1 px-2.5 font-jetbrains text-[0.6rem] font-black whitespace-nowrap pointer-events-none opacity-0 transition-all duration-300 [clip-path:polygon(10px_0%,100%_0%,100%_100%,0%_100%,0%_10px)] z-10 uppercase tracking-[0.05em] group-hover/info:opacity-100 group-hover/info:-translate-x-[20px]">VIEW_README</div>
                            </div>` 
                        : `<div></div>`;

                    container.innerHTML += `
                        <div class="script-item p-4 grid grid-cols-[12px_30px_minmax(0,1fr)_20px] gap-3 items-center cursor-grab transition-all duration-[0.2s] relative border-l-0 border-accent dark:border-d-accent animate-slideIn opacity-0 hover:bg-basalt-600 dark:hover:bg-d-basalt-600 hover:translate-x-1 hover:border-l-4 hover:shadow-[-10px_0_20px_rgba(255,166,0,0.05)] dark:hover:shadow-[-10px_0_20px_rgba(0,255,170,0.05)] bg-basalt-700 dark:bg-d-basalt-700" style="--i: ${index + 1}; animation-delay: calc(var(--i) * 0.05s);" data-module-name="${mod.name}">
                            <div class="w-3 h-5 opacity-50 bg-[radial-gradient(theme(colors.basalt.600)_1.5px,transparent_0)] dark:bg-[radial-gradient(theme(colors.d-basalt.600)_1.5px,transparent_0)] bg-[size:4px_4px]"></div>
                            <label class="flex items-center justify-center cursor-pointer">
                                <input type="checkbox" class="hidden peer" ${isChecked} onchange="updateToggle('${mod.name}', this.checked)">
                                <div class="w-[18px] h-[18px] border-2 border-basalt-600 dark:border-d-basalt-600 relative transition-all duration-300 peer-checked:bg-accent dark:peer-checked:bg-d-accent peer-checked:border-accent dark:peer-checked:border-d-accent peer-checked:shadow-[0_0_15px_rgba(255,166,0,0.15)] dark:peer-checked:shadow-[0_0_15px_rgba(0,255,170,0.15)] peer-checked:after:content-[''] peer-checked:after:absolute peer-checked:after:top-[2px] peer-checked:after:left-[5px] peer-checked:after:w-1 peer-checked:after:h-2 peer-checked:after:border-basalt-900 dark:peer-checked:after:border-d-basalt-900 peer-checked:after:border-r-2 peer-checked:after:border-b-2 peer-checked:after:rotate-45 peer-checked:after:border-t-0 peer-checked:after:border-l-0"></div>
                            </label>
                            <div class="min-w-0 pl-0 flex flex-col">
                                <span class="font-bold text-[0.95rem] block text-textMain dark:text-d-textMain">${mod.name}.ahk</span>
                            </div>
                            ${helpIconHtml}
                        </div>
                    `;
                });
            } catch (e) { console.error("Failed to load toggles", e); }
        }

        async function initProfiles() {
            if(!window.ahk) return;
            try {
                const profiles = JSON.parse(await ahk.GetProfiles());
                const currentProfile = await ahk.GetCurrentProfile();
                
                document.getElementById('currentProfileText').innerText = currentProfile.toUpperCase() + "_";
                const list = document.getElementById('profileList');
                list.innerHTML = '';
                
                profiles.forEach((prof, idx) => {
                    const isActive = (prof === currentProfile);
                    const borderClass = isActive ? 'border-l-2 border-accent dark:border-d-accent bg-basalt-600/50 dark:bg-d-basalt-600/50' : 'border-l-2 border-transparent hover:border-accent dark:hover:border-d-accent animate-slideIn opacity-0';
                    const textClass = isActive ? 'text-textMain dark:text-d-textMain' : 'text-textMuted dark:text-d-textMuted hover:text-accent dark:hover:text-d-accent';
                    
                    list.innerHTML += `
                        <button onclick="changeProfile('${prof}')" class="px-3 py-2 text-left text-[0.8rem] font-jetbrains transition-all duration-200 flex items-center gap-2 group/item ${borderClass} ${textClass}" style="animation-delay: ${idx * 0.05}s;">
                            <span>${prof}</span>
                        </button>
                    `;
                });
            } catch(e) { console.error("Failed to load profiles", e); }
        }

        window.changeProfile = async function(prof) {
            document.getElementById('profileDropdown').classList.remove('active');
            const currentProfile = await ahk.GetCurrentProfile();
            if(prof === currentProfile) return;

            const wipe = document.createElement('div');
            wipe.className = "fixed inset-0 z-[9999] pointer-events-none transition-all duration-500 ease-in-out opacity-0";
            wipe.style.background = document.documentElement.classList.contains('dark') 
                ? "linear-gradient(135deg, rgba(10,10,11,1) 0%, rgba(0,255,170,1) 100%)" 
                : "linear-gradient(135deg, rgba(35,35,42,1) 0%, rgba(255,136,0,1) 100%)";
            document.body.appendChild(wipe);
            
            requestAnimationFrame(() => { wipe.style.opacity = "1"; });

            setTimeout(() => { if(window.ahk) ahk.SetProfile(prof); }, 450);
        }

        window.updateToggle = function(name, value) { if (window.ahk) ahk.UpdateToggle(name, value ? 1 : 0); };
        window.showReadme = function(mod) { if (window.ahk) ahk.ShowReadme(mod); };
        
        window.addEventListener('DOMContentLoaded', () => { 
            initCheckboxes(); 
            initProfiles(); 
        });
    </script>
    <script>
        
    </script>
