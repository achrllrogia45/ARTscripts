<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit mode.ini</title>
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- CodeMirror Base & Theme -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/darcula.min.css">
    <!-- Link to our unified stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body> 
<!-- oncontextmenu="return false;" -->

    <div class="slab">
        <!-- FIX: Grain moved inside slab -->
        <div class="grain"></div>
        <!-- New settings-layout strips padding so editor is flush -->
        <div class="slab-inner settings-layout">
            <!-- Header (settings-header-wrap brings back padding just for the top area) -->
            <div class="header settings-header-wrap">
                <div style="display: flex;">
                    <div >
                        <span class="brand">System_Core <small style="color: #6a6a70; margin-left: 8px; font-size: 0.6rem;">EDITOR</small></span>
                    </div>
                        <!-- Save Button -->
                    <button class="save-btn" id="saveBtn" onclick="saveFile(this)">
                        <span>SAVE</span>
                    </button>
                </div>
                    <!-- Window Controls -->
                    <div class="window-controls">
                        <div class="win-btn" title="Minimize" onclick="if(window.ahk) ahk.gui.Minimize()">
                            <div class="icon-min"></div>
                        </div>
                        <div class="win-btn close" title="Close" onclick="if(window.ahk) ahk.gui.Hide()">
                            <div class="icon-close"></div>
                        </div> 
                </div>
            </div>

            <!-- Full Width/Height Code Editor Container -->
            <div class="editor-container">
                <textarea id="editor" spellcheck="false"></textarea>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/simple.min.js"></script>
    <script src="settings.js"></script>
</body>
</html>
