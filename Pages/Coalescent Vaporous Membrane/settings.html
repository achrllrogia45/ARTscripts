<!DOCTYPE html>
<html lang="en" class="!bg-transparent dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit mode.ini</title>
    <script>if(localStorage.theme==='light')document.documentElement.classList.remove('dark');else document.documentElement.classList.add('dark');</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        surface: 'rgba(255, 255, 255, 0.7)',
                        membraneBorder: 'rgba(0, 0, 0, 0.08)',
                        textMain: '#1e293b',
                        textDim: '#64748b',
                        accent: '#4f46e5',
                        
                        'd-surface': 'rgba(15, 23, 42, 0.65)',
                        'd-membraneBorder': 'rgba(255, 255, 255, 0.12)',
                        'd-textMain': '#f8fafc',
                        'd-textDim': '#94a3b8',
                        'd-accent': '#c7d2fe'
                    },
                    fontFamily: { inter: ['Inter', 'sans-serif'], jetbrains: ['JetBrains Mono', 'monospace'] },
                    boxShadow: { 'vapor': '0 25px 50px -12px rgba(0, 0, 0, 0.5)' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="vapor-bg text-textMain dark:text-d-textMain font-inter flex items-center justify-center w-screen h-screen m-0 overflow-hidden select-none" oncontextmenu="return true;"> 
    
    <div class="w-full h-full bg-surface dark:bg-d-surface backdrop-blur-[25px] border border-membraneBorder dark:border-d-membraneBorder flex flex-col shadow-vapor relative">
        
        <!-- Header -->
        <header class="p-6 pb-4 border-b border-membraneBorder dark:border-d-membraneBorder flex justify-between items-center shrink-0 [-webkit-app-region:drag]">
            <div class="flex flex-col gap-1">
                <span class="text-[11px] font-semibold tracking-[0.2em] uppercase opacity-90">Mode.ini Editor</span>
                <span class="font-jetbrains text-[10px] text-textDim dark:text-d-textDim">System Configuration</span>
            </div>
            <div class="flex items-center gap-4 [-webkit-app-region:no-drag]">
                <button class="bg-accent/10 dark:bg-d-accent/10 border border-accent/20 dark:border-d-accent/20 text-accent dark:text-d-accent py-1.5 px-4 rounded-xl text-[11px] font-semibold cursor-pointer transition-all hover:bg-accent hover:text-white dark:hover:bg-d-accent dark:hover:text-black shadow-lg" id="saveBtn" onclick="saveFile(this)">
                    Save Changes
                </button>
                <div class="flex gap-2">
                    <button class="bg-transparent border-none text-textDim dark:text-d-textDim hover:text-textMain dark:hover:text-d-textMain p-1 transition-all duration-300 cursor-pointer hover:-translate-y-[1px]" title="Minimize" onclick="if(window.ahk) ahk.gui.Minimize()">
                        <i class="bi bi-dash-lg text-[16px]"></i>
                    </button>
                    <button class="bg-transparent border-none text-textDim dark:text-d-textDim hover:text-textMain dark:hover:text-d-textMain p-1 transition-all duration-300 cursor-pointer hover:-translate-y-[1px]" title="Close" onclick="if(window.ahk) ahk.gui.Hide()">
                        <i class="bi bi-x-lg text-[16px]"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Code Editor Container -->
        <div class="flex-1 min-h-0 w-full [-webkit-app-region:no-drag] bg-transparent">
            <textarea id="editor" spellcheck="false"></textarea>
        </div>
    </div>

    <script>
        window.addEventListener('storage', (e) => {
            if (e.key === 'theme') {
                if(e.newValue === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/mode/simple.min.js"></script>
    <script>
        // Highly Contrasting Syntax Parser
        CodeMirror.defineSimpleMode("ini-vapor", {
            start: [
                { regex: /^[ \t]*;.*/, token: "comment" }, // Comments
                { regex: /^[ \t]*\[[^\]]+\]/, token: "header" }, // [Headers]
                { regex: /^([ \t]*)([^=]+?)([ \t]*=[ \t]*)/, token: [null, "keyword", "operator"] }, // Keys
                { regex: /\bnull\b/i, token: "atom" }, // null
                { regex: /\b(true|yes|on)\b/i, token: "bool-true" }, // true
                { regex: /\b(false|no|off)\b/i, token: "bool-false" }, // false
                { regex: /[-+]?\d+(?:\.\d+)?(?:px|em|pt|rem|%|vh|vw)\b/i, token: "unit" }, // 10px, 2em
                { regex: /[-+]?\d+(?:\.\d+)?/, token: "number" }, // numbers
                { regex: /"(?:[^\\]|\\.)*?(?:"|$)/, token: "string" }, // "strings"
                { regex: /'(?:[^\\]|\\.)*?(?:'|$)/, token: "string" }, // 'strings'
                { regex: /;.*/, token: "comment" }, // Inline comments
                { regex: /[^;\s]+/, token: "string" } // Values
            ]
        });

        const editorElement = document.getElementById('editor');
        const cm = CodeMirror.fromTextArea(editorElement, {
            mode: 'ini-vapor',
            lineNumbers: true,
            indentUnit: 4,
            scrollbarStyle: 'native',
            lineWrapping: true
        });
        
        async function loadFile() {
            if (window.ahk) {
                try {
                    const content = await ahk.GetIniContent();
                    cm.setValue(content);
                    setTimeout(() => cm.refresh(), 50);
                } catch (e) { console.error("Failed to load INI:", e); }
            }
        }

        function saveFile(btn) {
            if (window.ahk) {
                ahk.SaveIniContent(cm.getValue());
                if (btn) {
                    const oldHtml = btn.innerHTML;
                    btn.innerHTML = 'Saved ✓';
                    btn.classList.add('scale-105', '!bg-emerald-500', '!text-white', '!border-emerald-400');
                    setTimeout(() => {
                        btn.innerHTML = oldHtml;
                        btn.classList.remove('scale-105', '!bg-emerald-500', '!text-white', '!border-emerald-400');
                    }, 1200);
                }
            }
        }

        document.addEventListener('keydown', e => {
            if (e.ctrlKey && e.key.toLowerCase() === 's') { e.preventDefault(); saveFile(document.getElementById('saveBtn')); }
        });

        window.addEventListener('DOMContentLoaded', loadFile);
    </script>
</body>
</html>
