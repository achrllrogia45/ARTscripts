<!DOCTYPE html>
<html lang="en" class="!bg-transparent dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vapor Scripts Manager</title>
    <!-- Theme FOUC Preventer -->
    <script>if(localStorage.theme==='light')document.documentElement.classList.remove('dark');else document.documentElement.classList.add('dark');</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        // Light Mode
                        surface: 'rgba(255, 255, 255, 0.7)',
                        membrane: 'rgba(0, 0, 0, 0.04)',
                        membraneBorder: 'rgba(0, 0, 0, 0.08)',
                        textMain: '#1e293b',
                        textDim: '#64748b',
                        accent: '#4f46e5',
                        update: '#d97706',

                        // Dark Mode
                        'd-surface': 'rgba(15, 23, 42, 0.65)',
                        'd-membrane': 'rgba(255, 255, 255, 0.06)',
                        'd-membraneBorder': 'rgba(255, 255, 255, 0.12)',
                        'd-textMain': '#f8fafc',
                        'd-textDim': '#94a3b8',
                        'd-accent': '#c7d2fe',
                        'd-update': '#fbbf24'
                    },
                    fontFamily: {
                        inter: ['Inter', 'sans-serif'],
                        jetbrains: ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'vapor': '0 25px 50px -12px rgba(0, 0, 0, 0.5)'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="vapor-bg text-textMain dark:text-d-textMain font-inter flex items-center justify-center w-screen h-screen m-0 overflow-hidden select-none" oncontextmenu="return true;">

    <!-- The Membrane Container -->
    <div class="w-full h-full bg-surface dark:bg-d-surface backdrop-blur-[25px] border border-membraneBorder dark:border-d-membraneBorder sm:rounded-[32px] flex flex-col shadow-vapor relative overflow-hidden animate-appEntry">
        
        <!-- Header -->
        <header class="pt-6 px-6 pb-4 flex justify-between items-start shrink-0 [-webkit-app-region:drag]">
            <div class="flex flex-col gap-1">
                <span class="text-[11px] font-semibold tracking-[0.2em] uppercase opacity-90">Vapor Scripts</span>
                <div class="flex items-center gap-2 font-jetbrains text-[10px] text-textDim dark:text-d-textDim">
                    <span>v1.0.4</span>
                    <div class="flex items-center gap-1.5 bg-update/10 dark:bg-d-update/10 text-update dark:text-d-update px-2 py-[2px] rounded-full font-medium animate-vaporPulse cursor-pointer [-webkit-app-region:no-drag]" onclick="alert('Update Check Initialized...');">
                        <i class="bi bi-circle-fill text-[6px]"></i>
                        Update Available!
                    </div>
                </div>
            </div>
            <div class="flex gap-2 items-center [-webkit-app-region:no-drag]">
                <button class="bg-transparent border-none text-textDim dark:text-d-textDim hover:text-textMain dark:hover:text-d-textMain p-1 transition-all duration-300 cursor-pointer hover:-translate-y-[1px]" title="Author Profile" onclick="window.open('https://github.com/achrllrogia45', '_blank')">
                    <i class="bi bi-github text-[16px]"></i>
                </button>
                <button class="bg-transparent border-none text-textDim dark:text-d-textDim hover:text-textMain dark:hover:text-d-textMain p-1 transition-all duration-300 cursor-pointer hover:-translate-y-[1px]" title="Minimize" onclick="if(window.ahk) ahk.gui.Minimize()">
                    <i class="bi bi-dash-lg text-[16px]"></i>
                </button>
                <button class="bg-transparent border-none text-textDim dark:text-d-textDim hover:text-textMain dark:hover:text-d-textMain p-1 transition-all duration-300 cursor-pointer hover:-translate-y-[1px]" title="Close" onclick="if(window.ahk) ahk.gui.Hide()">
                    <i class="bi bi-x-lg text-[16px]"></i>
                </button>
            </div>
        </header>

        <!-- Sub-Header / Toggles -->
        <div class="px-6 pb-4 flex justify-between items-center shrink-0 [-webkit-app-region:no-drag]">
            <div class="relative cursor-pointer group" id="profileDropdown">
                <div class="flex items-center gap-2 bg-membrane dark:bg-d-membrane px-3 py-1.5 rounded-xl border border-membraneBorder dark:border-d-membraneBorder text-[12px] transition-all hover:bg-black/10 dark:hover:bg-white/10" onclick="document.getElementById('profileDropdown').classList.toggle('active')">
                    <span>Default Profile</span>
                    <i class="bi bi-chevron-down text-[10px]"></i>
                </div>
                <div class="absolute top-[40px] left-0 w-[140px] bg-surface dark:bg-d-surface backdrop-blur-[20px] border border-membraneBorder dark:border-d-membraneBorder rounded-xl p-2 hidden group-[.active]:block z-20 shadow-[0_10px_25px_rgba(0,0,0,0.3)]">
                    <div class="p-2 text-[12px] text-textDim dark:text-d-textDim rounded-lg transition-colors hover:bg-membrane dark:hover:bg-d-membrane hover:text-textMain dark:hover:text-d-textMain">Default Profile</div>
                    <div class="p-2 text-[12px] text-textDim dark:text-d-textDim rounded-lg transition-colors hover:bg-membrane dark:hover:bg-d-membrane hover:text-textMain dark:hover:text-d-textMain">Developer</div>
                </div>
            </div>
            <button class="w-[36px] h-[36px] rounded-xl bg-membrane dark:bg-d-membrane border border-membraneBorder dark:border-d-membraneBorder flex items-center justify-center cursor-pointer transition-all hover:bg-black/10 dark:hover:bg-white/10" id="theme-toggle-button">
                <i id="theme-toggle-icon" class="bi bi-moon-stars text-[14px]"></i>
            </button>
        </div>

        <!-- Dynamic Script List -->
        <main class="flex-1 overflow-y-auto overflow-x-hidden px-6 pb-5 script-container [-webkit-app-region:no-drag]" id="sortableList"></main>

        <!-- Footer -->
        <footer class="p-4 px-6 border-t border-membraneBorder dark:border-d-membraneBorder flex justify-between items-center shrink-0 [-webkit-app-region:no-drag]">
            <button class="bg-textMain dark:bg-d-textMain text-surface dark:text-d-surface border-none py-2 px-4 rounded-xl text-[12px] font-semibold cursor-pointer transition-all duration-300 hover:scale-[1.03] shadow-lg shadow-black/10 dark:shadow-white/10" 
                onclick="this.innerHTML='Syncing...'; if(window.ahk) ahk.ReloadScript(); setTimeout(() => this.innerHTML='Reload Scripts', 1000)">
                Reload Scripts
            </button>
            <div class="text-textDim dark:text-d-textDim cursor-pointer transition-all duration-300 hover:text-textMain dark:hover:text-d-textMain hover:rotate-45" title="Settings" 
                onclick="if(window.ahk) { ahk.ShowSettings().catch(e => alert(e)); }">
                <i class="bi bi-gear-fill text-[18px]"></i>
            </div>
        </footer>
    </div>

    <script>
        // --- THEME LOGIC ---
        const themeToggleButton = document.getElementById('theme-toggle-button');
        const themeToggleIcon = document.getElementById('theme-toggle-icon');

        function applyTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                if(themeToggleIcon) themeToggleIcon.className = 'bi bi-moon-stars text-[14px] text-d-textMain';
            } else {
                document.documentElement.classList.remove('dark');
                if(themeToggleIcon) themeToggleIcon.className = 'bi bi-brightness-high text-[14px] text-textMain';
            }
        }
        
        applyTheme(localStorage.getItem('theme') || 'dark');

        themeToggleButton.addEventListener('click', () => {
            const isCurrentlyDark = document.documentElement.classList.contains('dark');
            const newTheme = isCurrentlyDark ? 'light' : 'dark';
            localStorage.setItem('theme', newTheme);
            applyTheme(newTheme);
            if (window.ahk) ahk.UpdateToggle("Theme", (newTheme === 'dark') ? 1 : 0);
        });
        
        window.addEventListener('storage', (e) => { if (e.key === 'theme') applyTheme(e.newValue); });

        window.onclick = function(event) {
            if (!event.target.closest('#profileDropdown')) document.getElementById('profileDropdown').classList.remove('active');
        }
    </script>
    <script type="module">
        async function initCheckboxes() {
            if (!window.ahk) return;
            try {
                const modulesStr = await ahk.GetModules();
                const modules = JSON.parse(modulesStr);
                const toggles = JSON.parse(await ahk.GetToggles());
                const readmes = JSON.parse(await ahk.GetReadmes());
                const container = document.getElementById('sortableList');
                container.innerHTML = '';

                modules.forEach((mod) => {
                    const isChecked = (toggles[mod.name] == 1 || toggles[mod.name] == true) ? 'checked' : '';
                    const hasReadme = (readmes[mod.name] == 1 || readmes[mod.name] === true);
                    
                    const helpIconHtml = hasReadme 
                        ? `<div class="help-icon ml-auto relative group/tooltip" onclick="showReadme('${mod.name}')">
                                <i class="bi bi-info-circle text-[16px]"></i>
                                <div class="absolute left-full top-1/2 -translate-y-1/2 -translate-x-2.5 bg-textMain dark:bg-surface
                                backdrop-blur-md text-surface dark:text-textMain px-3 py-2 rounded-lg text-[11px] w-[140px] text-center
                                pointer-events-none opacity-0 transition-all duration-300 group-hover/tooltip:opacity-100 group-hover/tooltip:-translate-x-[15em]
                                z-10 border border-membraneBorder dark:border-d-membraneBorder shadow-xl">View Details</div>
                           </div>` : ``;

                    container.innerHTML += `
                        <div class="script-item flex items-center p-3 sm:p-4 border-b border-membraneBorder dark:border-d-membraneBorder gap-4 transition-all duration-300 cursor-grab hover:bg-membrane dark:hover:bg-d-membrane hover:rounded-2xl hover:border-transparent group" data-module-name="${mod.name}">
                            <div class="text-textDim dark:text-d-textDim opacity-30 group-hover:opacity-100 transition-opacity">
                                <i class="bi bi-grip-vertical text-[18px]"></i>
                            </div>
                            <label class="relative flex items-center cursor-pointer shrink-0">
                                <input type="checkbox" class="peer sr-only" ${isChecked} onchange="updateToggle('${mod.name}', this.checked)">
                                <div class="w-[18px] h-[18px] border-2 border-membraneBorder dark:border-d-membraneBorder rounded-md flex items-center justify-center transition-all peer-checked:bg-accent dark:peer-checked:bg-d-accent peer-checked:border-accent dark:peer-checked:border-d-accent">
                                    <i class="bi bi-check text-white text-[14px] opacity-0 peer-checked:opacity-100 font-bold leading-none mt-0.5"></i>
                                </div>
                            </label>
                            <div class="flex-1 flex flex-col min-w-0">
                                <span class="text-[13px] font-medium text-textMain dark:text-d-textMain truncate">${mod.name}</span>
                                <span class="font-jetbrains text-[10px] text-textDim dark:text-d-textDim mt-0.5 truncate">${mod.size}</span>
                                <span class="font-jetbrains text-decoration-none text-[10px] text-accent dark:text-d-accent mt-0.5 truncate transition-colors">${mod.path}</span>
                            </div>
                            ${helpIconHtml}
                        </div>
                    `;
                });
                attachDragEvents();
            } catch (e) { console.error("Failed", e); }
        }

        window.showReadme = function(mod) { if (window.ahk) ahk.ShowReadme(mod); };
        window.hideReadme = function() { if (window.ahk) ahk.HideReadme(); };
        window.updateToggle = function(name, value) { if (window.ahk) ahk.UpdateToggle(name, value ? 1 : 0); };

        let dragSrcEl = null;
        function handleDragStart(e) { this.style.opacity = '0.4'; dragSrcEl = this; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/html', this.innerHTML); }
        function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; return false; }
        function handleDragEnter(e) { this.classList.add('bg-membrane', 'dark:bg-d-membrane', 'rounded-2xl'); }
        function handleDragLeave(e) { this.classList.remove('bg-membrane', 'dark:bg-d-membrane', 'rounded-2xl'); }
        function handleDrop(e) { e.stopPropagation(); if (dragSrcEl !== this) { const list = document.getElementById('sortableList'); const rect = this.getBoundingClientRect(); const midpoint = rect.top + rect.height / 2; if (e.clientY >= midpoint) { this.parentNode.insertBefore(dragSrcEl, this.nextSibling); } else { this.parentNode.insertBefore(dragSrcEl, this); } } return false; }
        function handleDragEnd(e) { this.style.opacity = '1'; document.querySelectorAll('.script-item').forEach(i => i.classList.remove('bg-membrane', 'dark:bg-d-membrane', 'rounded-2xl')); saveModuleOrder(); }
        
        function saveModuleOrder() {
            const moduleItems = document.querySelectorAll('#sortableList .script-item');
            const moduleOrder = Array.from(moduleItems).map(item => item.dataset.moduleName);
            if (window.ahk) ahk.UpdateModuleOrder(JSON.stringify(moduleOrder));
        }

        function attachDragEvents() {
            document.querySelectorAll('.script-item').forEach(function(item) {
                item.setAttribute('draggable', 'true');
                item.addEventListener('dragstart', handleDragStart, false);
                item.addEventListener('dragenter', handleDragEnter, false);
                item.addEventListener('dragleave', handleDragLeave, false);
                item.addEventListener('dragover', handleDragOver, false);
                item.addEventListener('drop', handleDrop, false);
                item.addEventListener('dragend', handleDragEnd, false);
            });
        }
        window.addEventListener('DOMContentLoaded', initCheckboxes);
    </script>
</body>
</html>
