        /* Light Theme */
        html:not(.dark) body { background-color: #ededf0 !important; color: #23232a !important; }
        html:not(.dark) h1, html:not(.dark) h2, html:not(.dark) h3 { color: #ff8800 !important; }

        html:not(.dark) ::-webkit-scrollbar-thumb { background: #bfc0c7; }
        html:not(.dark) ::-webkit-scrollbar-thumb:hover { background: #ff8800; }

        /* Dark Theme */
        html.dark body { background-color: #161618 !important; color: #e2e2e7 !important; }
        html.dark h1, html.dark h2, html.dark h3 { color: #00ffaa !important; }
        html.dark h1 { border-bottom: 4px solid #242427; }
        html.dark h2 { border-bottom: 1px solid #242427; }

        html.dark ::-webkit-scrollbar-track { background: #161618; }
        html.dark ::-webkit-scrollbar-thumb { background: #323236; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #00ffaa; }

        /* Formatting */
        h1, h2, h3 { font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; }

        h3 { font-size: 0.85rem; margin-top: 20px; margin-bottom: 6px; }
        p, li { line-height: 1.6; margin-top: 0; margin-bottom: 14px; }
        ul, ol { padding-left: 20px; margin-top: 0; margin-bottom: 14px; }
        code { padding: 3px 6px; border-radius: 0; font-size: 13px; }
        ::-webkit-scrollbar { width: 4px; }
