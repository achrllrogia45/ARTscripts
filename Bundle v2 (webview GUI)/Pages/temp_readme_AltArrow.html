<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>AltArrow ReadMe</title>
    <style>
        body { background: #161618; color: #e0e0e0; font-family: sans-serif; padding: 20px; overflow-y: auto; }
        h1, h2, h3 { color: #00ff88; }
        a { color: #00ff88; text-decoration: none; }
        a:hover { text-decoration: underline; }
        code { background: #222; padding: 2px 4px; border-radius: 4px; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ff88; }
    </style>
    <script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script>
</head>
<body oncontextmenu='return false;'>
    <div id='content'></div>
    <script>
        const md = '# ALTARROW MODULE - README\n## FUNCTIONALITY\n- Remaps Alt + Arrow keys to function as Home/End and Ctrl + Home/End.\n- Specifically designed for users who prefer using the arrow keys for navigation but want quick access to Home/End functionality.\n## REQUIREMENTS\n- Must have a global \'Toggles\' object defined in Main.ahk.\n- Only works when \'AltArrow\' key is set to 1.\n## CONFIGURATION\n- Set the hotkeys for toggling this module in the INI file under [AltArrow_config] with the key \'AltArrow_mode\'. Default is Alt + Arrow keys.';
        document.getElementById('content').innerHTML = marked.parse(md);
    </script>
</body>
</html>
