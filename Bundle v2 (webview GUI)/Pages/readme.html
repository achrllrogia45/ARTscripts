<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Readme</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #161618;
            --accent-color: #00ff88; /* Cyberpunk Green */
            --text-main: #e0e0e0;
            --text-muted: #888;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            letter-spacing: -0.02em;
            border: 1px solid #333;
            border-radius: 12px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .ahk-titleBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            padding: 0 12px 0 20px;
            -webkit-app-region: drag;
            user-select: none;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid #222;
        }

        .window-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-title::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .window-controls {
            display: flex;
            gap: 4px;
            -webkit-app-region: no-drag;
        }

        .ctrl-btn {
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
            border-radius: 6px;
            transition: all 0.2s ease;
            font-family: sans-serif;
            font-size: 14px;
            -webkit-app-region: no-drag;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
        }

        .ctrl-btn-close:hover {
            background: rgba(220, 53, 69, 0.9);
            color: #fff;
        }

        .content {
            padding: 20px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
        }

        #markdown-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Tiny Custom Scrollbar */
        #markdown-container::-webkit-scrollbar {
            width: 4px;
        }
        #markdown-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        #markdown-container::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        #markdown-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }

        /* Markdown Styles */
        #markdown-container h1, #markdown-container h2, #markdown-container h3 {
            color: #fff;
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }
        
        #markdown-container h1 { font-size: 1.3rem; color: var(--accent-color); }
        #markdown-container p { margin-bottom: 12px; }
        #markdown-container ul { padding-left: 20px; }
        #markdown-container li { margin-bottom: 4px; }
        #markdown-container code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 4px;
            border-radius: 4px;
            font-family: Consolas, monospace;
            font-size: 0.85em;
        }
        #markdown-container pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="ahk-titleBar">
        <div class="window-title" id="module-title">Readme</div>
        <div class="window-controls">
            <div class="ctrl-btn" onclick="if(window.ahk) ahk.gui.Minimize()">─</div>
            <div class="ctrl-btn ctrl-btn-close" onclick="if(window.ahk) ahk.gui.Hide()">✕</div>
        </div>
    </div>

    <div class="content" id="main-content">
        <div id="markdown-container">
            Loading...
        </div>
    </div>

<script>
    async function initReadme() {
        if (!window.ahk) return;
        try {
            const modName = await ahk.GetModuleName();
            document.getElementById('module-title').innerText = modName + " - Readme";

            const rawContent = await ahk.GetReadmeContent();
            
            // Wait for marked to be available via CDN
            if (typeof marked !== 'undefined') {
                document.getElementById('markdown-container').innerHTML = marked.parse(rawContent);
            } else {
                const pre = document.createElement('pre');
                pre.innerText = rawContent;
                document.getElementById('markdown-container').innerHTML = '';
                document.getElementById('markdown-container').appendChild(pre);
            }
        } catch (e) {
            console.error("Failed to load readme", e);
            document.getElementById('markdown-container').innerText = "Error loading markdown.";
        }
    }

    // Run on load
    window.addEventListener('DOMContentLoaded', () => {
        initReadme();
    });
</script>
</body>
</html>
