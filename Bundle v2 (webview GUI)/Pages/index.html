<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modules</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #161618;
            --accent-color: #00ff88; /* Cyberpunk Green */
            --text-main: #e0e0e0;
            --text-muted: #888;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            letter-spacing: -0.02em;
            border: 1px solid #333;
            border-radius: 12px;
            box-sizing: border-box;
            overflow: hidden;
            /* user-select: none; */
        }

        .ahk-titleBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            padding: 0 12px 0 20px;
            -webkit-app-region: drag;
            user-select: none;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid #222;
        }

        .window-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .window-title::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .window-controls {
            display: flex;
            gap: 4px;
            -webkit-app-region: no-drag;
        }

        .ctrl-btn {
            width: 28px;
            height: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
            border-radius: 6px;
            transition: all 0.2s ease;
            font-family: sans-serif;
            font-size: 14px;
        }

        .ctrl-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
        }

        .ctrl-btn-close:hover {
            background: rgba(220, 53, 69, 0.9);
            color: #fff;
        }

        .content {
            padding: 20px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
            user-select: none;
        }

        #modules-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
            margin-bottom: 12px;
        }

        /* Tiny Custom Scrollbar */
        #modules-container::-webkit-scrollbar {
            width: 4px;
        }
        #modules-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        #modules-container::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        #modules-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }

        /* Minimalist Checkbox Styling */
        .form-check {
            padding-left: 0;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .form-check-label {
            font-size: 0.9rem;
            color: var(--text-main);
            order: 1;
            cursor: pointer;
        }

        .form-check .form-check-input {
            order: 2;
            float: none;
            margin: 0 !important;
            background-color: #222;
            border: 1px solid #333;
            width: 1.2em;
            height: 1.2em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .form-check .form-check-input:checked {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            filter: drop-shadow(0 0 5px rgba(0, 255, 136, 0.4));
        }

        .form-check .form-check-input:focus {
            box-shadow: none;
            border-color: var(--accent-color);
        }

        /* Minimalist Reload Button */
        .btn-reload {
            width: 100%;
            margin-top: auto;
            margin-bottom: 4px;
            background: transparent;
            border: 1px solid #333;
            color: var(--text-main);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-reload:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            transform: translateY(-1px);
        }

        .btn-reload:active {
            transform: translateY(0);
        }

        /* Subtle Module Hover Effect */
        .form-check:hover .form-check-label {
            color: var(--accent-color);
        }
    </style>
<style>
    .help-icon {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background-color: #555;
        color: #fff;
        font-size: 12px;
        font-weight: bold;
        cursor: help;
        user-select: none;
    }
    .help-icon:hover {
        background-color: #777;
    }
</style>
</head>
<body oncontextmenu="return false;">

    <div class="ahk-titleBar">
        <div class="window-title">Scripts Modules</div>
        <div class="window-controls">
            <div class="ctrl-btn" onclick="if(window.ahk) ahk.gui.Minimize()">─</div>
            <div class="ctrl-btn ctrl-btn-close" onclick="if(window.ahk) ahk.gui.Hide()">✕</div>
        </div>
    </div>

<div class="content" id="main-content">
        <div id="modules-container">
            <!-- Dynamic checkboxes will be generated here -->
        </div>

        <button type="button" class="btn btn-reload" onclick="this.innerHTML='Syncing...'; if(window.ahk) ahk.ReloadScript(); setTimeout(() => this.innerHTML='RELOAD SCRIPT', 1000)">
            RELOAD SCRIPT
        </button>
    </div>

<script>
    // Initialize checkboxes from AHK dynamically
    async function initCheckboxes() {
        if (!window.ahk) return;

        try {
            const modulesStr = await ahk.GetModules();
            const modules = JSON.parse(modulesStr);
            
            const resultStr = await ahk.GetToggles();
            const toggles = JSON.parse(resultStr);

            const readmesStr = await ahk.GetReadmes();
            const readmes = JSON.parse(readmesStr);

            const container = document.getElementById('modules-container');
            container.innerHTML = '';

            modules.forEach(mod => {
                const isChecked = toggles[mod] == 1 || toggles[mod] == true ? 'checked' : '';
                const hasReadme = readmes[mod] == 1 || readmes[mod] === true;
                const helpIcon = hasReadme ? `<span class="help-icon" onclick="showReadme('${mod}')">?</span>` : ``;

                container.innerHTML += `
                    <div class="form-check">
                        <label class="form-check-label" for="${mod}">${mod}</label>
                        <div style="display:flex; align-items:center; gap:12px; order:2;">
                            ${helpIcon}
                            <input class="form-check-input" type="checkbox" id="${mod}" style="order:unset" ${isChecked} onchange="updateToggle('${mod}', this.checked)">
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            console.error("Failed to load toggles", e);
        }
    }

    function showReadme(mod) {
        if (window.ahk) {
            ahk.ShowReadme(mod);
        }
    }

    function hideReadme() {
        if (window.ahk) {
            ahk.HideReadme();
        }
    }

    // Send toggle state to AHK
    function updateToggle(name, value) {
        if (window.ahk) {
            ahk.UpdateToggle(name, value ? 1 : 0);
        }
    }

    // Run on load
    window.addEventListener('DOMContentLoaded', () => {
        initCheckboxes();
    });
</script>

</body>
</html>
