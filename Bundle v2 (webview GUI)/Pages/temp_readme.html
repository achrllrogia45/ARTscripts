<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>ReadMe</title>
    <style>
        :root {
            --bg-dark: #161618;
            --accent-color: #00ff88;
            --text-main: #e0e0e0;
            --text-muted: #888;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 30px;
            line-height: 1.6;
            overflow-y: auto;
            overflow-x: hidden;
        }
        h1, h2, h3, h4 {
            color: var(--accent-color);
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-top: 20px;
        }
        ul, ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        code {
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 2px 6px;
            color: var(--accent-color);
            font-family: monospace;
        }
        pre {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid #333;
        }
        pre code {
            background: none;
            border: none;
            padding: 0;
            color: #e0e0e0;
        }
        a {
            color: var(--accent-color);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }
    </style>
    <script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script>
</head>
<body oncontextmenu='return false;'>
    <div id='content'></div>
    <script>
        const markdownStr = " )

; Escape special characters for string literal in JS
cleanText := StrReplace(readmeText, "\", "\\")
cleanText := StrReplace(cleanText, """, "\"")
cleanText := StrReplace(cleanText, "`", "\`")
cleanText := StrReplace(cleanText, "
", "\n")
cleanText := StrReplace(cleanText, "", "")

htmlContent .= cleanText . ";

        // Render markdown to HTML
        document.getElementById('content').innerHTML = marked.parse(markdownStr);
    </script>
</body>
</html><!DOCTYPE html>
